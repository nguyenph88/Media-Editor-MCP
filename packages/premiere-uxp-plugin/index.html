<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        padding: 10px;
        font-family: "Adobe Clean", sans-serif;
        font-size: 12px;
        color: #d4d4d4;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      #dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #c0392b;
        flex: 0 0 auto;
      }
      #dot.connecting { background: #e6a23c; }
      #dot.connected { background: #2ecc71; }
      #log {
        height: 110px;
        overflow-y: auto;
        background: #1e1e1e;
        border: 1px solid #3a3a3a;
        border-radius: 3px;
        padding: 4px 6px;
        font-family: monospace;
        font-size: 10px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      button {
        background: #3a3a3a;
        color: #d4d4d4;
        border: 1px solid #555;
        border-radius: 3px;
        padding: 3px 10px;
        cursor: pointer;
      }
      button:hover { background: #4a4a4a; }
    </style>
  </head>
  <body>
    <div class="row">
      <div id="dot"></div>
      <span id="status">Disconnected</span>
      <button id="toggle">Connect</button>
    </div>
    <div id="log"></div>
    <script src="dist/main.js"></script>
  </body>
</html>
