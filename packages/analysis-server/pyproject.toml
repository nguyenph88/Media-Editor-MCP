[project]
name = "ppmcp-analysis-server"
version = "0.1.0"
description = "Media-analysis MCP server: beat detection, transcription, SRT, text-overlay PNGs"
requires-python = ">=3.11,<3.13"
dependencies = [
    "mcp>=1.12.0",
    "beat-this>=1.1.0",
    "librosa>=0.10.2",
    "faster-whisper>=1.1.0",
    "imageio-ffmpeg>=0.5.1",
    "pillow>=10.4.0",
    "srt>=3.5.3",
    "numpy>=1.26",
    "soundfile>=0.12.1",
    "opencv-python-headless>=4.10",
    "requests>=2.32",
]

[project.scripts]
ppmcp-analysis = "ppmcp_analysis.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ppmcp_analysis"]

[tool.uv]
# beat-this pulls torch; keep CPU wheels on Windows (no CUDA toolchain assumption)
